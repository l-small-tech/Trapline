# Trapline location blocks — include this file inside the server {} block of
# /etc/nginx/sites-available/default.
#
# Replace /opt/trapline below with the path to your clone; `./trapline setup`
# prints these exact commands with the right paths for your machine:
#
#     include /opt/trapline/deploy/nginx-trapline.conf;
#
# then:
#     sudo nginx -t && sudo systemctl reload nginx
#     sudo setfacl -R -m u:www-data:rX /opt/trapline/web/dist

location = /trapline { return 301 /trapline/; }

# Static SPA build, served directly by nginx.
location /trapline/ {
    alias /opt/trapline/web/dist/;
    try_files $uri $uri/ /trapline/index.html;
}

# API → Node service on loopback.
location /trapline/api/ {
    proxy_pass http://127.0.0.1:8731;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# SSE live stream: no buffering, long read timeout.
location = /trapline/api/live {
    proxy_pass http://127.0.0.1:8731;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
}
