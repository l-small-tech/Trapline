# Trapline on beast — proxy to the Docker container (host network, 127.0.0.1:8731).
# The container serves both the UI and the API, so everything proxies.
# Installed as /etc/nginx/apps/trapline.conf (dir set up by beast-nginx-permissions.sh).

location = /trapline { return 301 /trapline/; }

location /trapline/ {
    proxy_pass http://127.0.0.1:8731;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# SSE live stream: no buffering, long read timeout.
location = /trapline/api/live {
    proxy_pass http://127.0.0.1:8731;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
}
