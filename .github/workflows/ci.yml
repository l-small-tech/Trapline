# Typecheck, tests, and a standalone-binary smoke test on all three OSes.
# Note: hosted runners block ICMP egress, so CI never asserts probe success —
# only that the server builds, boots, and serves the embedded UI.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:web
        env:
          TRAPLINE_RELEASE: '1'
      - run: node scripts/build-sea.mjs --skip-web
      - name: Smoke test the binary
        shell: bash
        run: |
          set -euo pipefail
          BIN=$(ls dist/trapline-v*)
          "$BIN" --version
          "$BIN" --no-browser --port 8765 --data-dir "$RUNNER_TEMP/tl-smoke" &
          PID=$!
          ok=''
          for _ in $(seq 30); do
            if curl -fsS http://127.0.0.1:8765/trapline/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          [ -n "$ok" ] || { echo "server never became healthy"; exit 1; }
          curl -fsS http://127.0.0.1:8765/trapline/api/health
          curl -fsS http://127.0.0.1:8765/trapline/ | grep -qi '<!doctype html'
          curl -fsS http://127.0.0.1:8765/trapline/api/status >/dev/null
          kill $PID || true
